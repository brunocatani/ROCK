name: Build And Test

on:
  push:
    branches:
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ROCK Release Build And Tests
    runs-on: [self-hosted, Windows, X64, fo4vr]
    env:
      BUILD_DIR: build-ci
      DEFAULT_F4VR_COMMON_FRAMEWORK_PATH: E:\fo4dev\PROJECT_ROCK_V2\libraries_and_tools\F4VR-CommonFramework
      DEFAULT_VCPKG_ROOT: C:\vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          submodules: recursive

      - name: Preflight Local Dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ vars.VCPKG_ROOT }}"
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            $vcpkgRoot = $env:DEFAULT_VCPKG_ROOT
          }
          if (-not (Test-Path (Join-Path $vcpkgRoot 'scripts/buildsystems/vcpkg.cmake'))) {
            throw "VCPKG_ROOT does not contain the vcpkg CMake toolchain: $vcpkgRoot"
          }

          $frameworkPath = "${{ vars.F4VR_COMMON_FRAMEWORK_PATH }}"
          if ([string]::IsNullOrWhiteSpace($frameworkPath)) {
            $frameworkPath = $env:DEFAULT_F4VR_COMMON_FRAMEWORK_PATH
          }
          if (-not (Test-Path (Join-Path $frameworkPath 'src/ModBase.h'))) {
            throw "F4VR-CommonFramework path is missing src/ModBase.h: $frameworkPath"
          }

          $localOnly = @(
            'src/physics-interaction/native/HavokRuntime.cpp',
            'src/physics-interaction/native/HavokOffsets.h'
          )
          foreach ($path in $localOnly) {
            if (-not (Test-Path $path)) {
              throw "Local-only ignored Havok file is missing: $path"
            }
          }

          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          "F4VR_COMMON_FRAMEWORK_PATH=$frameworkPath" >> $env:GITHUB_ENV

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B $env:BUILD_DIR
          -G "Visual Studio 17 2022" -A x64
          -DF4VR_COMMON_FRAMEWORK_PATH="$env:F4VR_COMMON_FRAMEWORK_PATH"
          -DBUILD_ROCK_TESTS=ON

      - name: Build
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir $env:BUILD_DIR -C Release --output-on-failure
