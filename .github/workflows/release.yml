name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Release name for the uploaded artifact.
        required: true
        default: v0.1

permissions:
  contents: read

jobs:
  release-build:
    name: ROCK Manual Release Artifact
    runs-on: [self-hosted, Windows, X64, fo4vr]
    env:
      BUILD_DIR: build-release
      DEFAULT_F4VR_COMMON_FRAMEWORK_PATH: E:\fo4dev\PROJECT_ROCK_V2\libraries_and_tools\F4VR-CommonFramework
      DEFAULT_VCPKG_ROOT: C:\vcpkg
    steps:
      - name: Require Main Branch
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -ne "main") {
            throw "Manual release builds must be run from main."
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          submodules: recursive

      - name: Preflight Local Dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ vars.VCPKG_ROOT }}"
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            $vcpkgRoot = $env:DEFAULT_VCPKG_ROOT
          }
          $frameworkPath = "${{ vars.F4VR_COMMON_FRAMEWORK_PATH }}"
          if ([string]::IsNullOrWhiteSpace($frameworkPath)) {
            $frameworkPath = $env:DEFAULT_F4VR_COMMON_FRAMEWORK_PATH
          }
          foreach ($path in @(
            (Join-Path $vcpkgRoot 'scripts/buildsystems/vcpkg.cmake'),
            (Join-Path $frameworkPath 'src/ModBase.h'),
            'src/physics-interaction/native/HavokRuntime.cpp',
            'src/physics-interaction/native/HavokOffsets.h'
          )) {
            if (-not (Test-Path $path)) {
              throw "Required local release dependency is missing: $path"
            }
          }
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          "F4VR_COMMON_FRAMEWORK_PATH=$frameworkPath" >> $env:GITHUB_ENV

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B $env:BUILD_DIR
          -G "Visual Studio 17 2022" -A x64
          -DF4VR_COMMON_FRAMEWORK_PATH="$env:F4VR_COMMON_FRAMEWORK_PATH"

      - name: Build Release
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROCK-${{ inputs.release_name }}-Release
          path: |
            ${{ env.BUILD_DIR }}/Release/ROCK.dll
            ${{ env.BUILD_DIR }}/Release/ROCK.pdb
            data/config/ROCK.ini
