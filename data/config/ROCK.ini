; ROCK.ini - Realistic Overengineered Character Kinetics for Fallout 4 VR
;
; This file is grouped by what a user is likely to tune.
; Section names like [Debug] and [PhysicsInteraction] are read by the plugin.
; Headings that start with "; ---" are comments only.
;
; Unit notes:
; - "game units" are Fallout world units.
; - "Havok units" are meters. In FO4VR, 1 Havok meter is about 70 game units.
; - Hex filter values are written without "0x".
;
; Missing keys use the compiled defaults. Keep a backup before tuning.

[Debug]

; --- Log File ---
; ROCK.log detail level. 2=info is normal, 1=debug and 0=trace are noisy.
iLogLevel = 2

; Text format for each ROCK.log line.
sLogPattern = %Y-%m-%d %H:%M:%S.%e [%l] %v

; Minimum time between repeated sampled diagnostic messages.
iLogSampleMilliseconds = 2000

; Diagnostics-only performance profiler. Disabled keeps high-resolution timers out of the frame path.
bPerformanceProfilerEnabled = false
iPerformanceProfilerLogIntervalFrames = 300
iPerformanceProfilerWarmupFrames = 120
bPerformanceProfilerOverlayText = false

[PhysicsInteraction]

; ============================================================================
; 1. Main Switches
; ============================================================================

; Turns all ROCK interaction work on or off.
; False disables hand collision, object selection, grabs, constraints, and weapon collision updates.
bEnabled = true

; ============================================================================
; 2. Controller Input
; ============================================================================

; Lets ROCK intercept raw VR buttons before Fallout VR consumes them.
; Keep enabled if right grip should grab objects without also readying the weapon.
bInputRemapEnabled = true

; Right-hand button used to ready or holster the weapon. 32 is thumbstick/touchpad click.
iRightWeaponReadyButtonID = 32

; Stops right grip from reaching the base game while holstered, so grip can be ROCK grab.
; When a weapon is drawn, grip can still pass through for vanilla reload behavior.
bSuppressRightGrabGameInput = true

; Stops the same button from opening Favorites when ROCK uses it for ready/holster.
bSuppressRightFavoritesGameInput = true

; Blocks Fallout VR's automatic weapon ready behavior while holstered.
; This prevents trigger/grip from unexpectedly drawing the weapon during object interaction.
bSuppressNativeReadyWeaponAutoReady = true

; Keeps a grab press alive briefly while selection, pull catch, or input suppression settles.
; This feeds only ROCK's internal grab edge and never changes raw release-to-cancel behavior.
bGrabInputIntentStateEnabled = true
fGrabInputLeewaySeconds = 0.12
fGrabInputForceSeconds = 0.08

; ============================================================================
; 3. Palm And Pointing Directions
; ============================================================================

; Palm normal is the short ray out of the palm used for close selection and debug yellow line.
; These values are in ROCK hand space: X=fingers, Y=across palm, Z=palm face.
fPalmNormalHandspaceX = 0.0
fPalmNormalHandspaceY = 0.0
fPalmNormalHandspaceZ = 1.0

; Pointing vector is the long ray used for far selection and debug blue line.
fPointingVectorHandspaceX = 0.0
fPointingVectorHandspaceY = 0.0
fPointingVectorHandspaceZ = 1.0

; Flips the palm normal if close selection is coming from the back of the hand.
bReversePalmNormal = true

; Flips the far-selection ray if the blue debug line points backward.
bReverseFarGrabNormal = true

; ============================================================================
; 4. Weapon Collision And Support Grip
; ============================================================================

; Builds ROCK weapon collision hulls from the visible equipped weapon mesh.
; These hulls are used for hand contact, support grip, and weapon interaction evidence.
bWeaponCollisionEnabled = true

; Controls whether ROCK weapon hulls collide with projectile/spell layers.
; False avoids self-collisions with modded projectile systems while aiming.
bWeaponCollisionBlocksProjectiles = false
bWeaponCollisionBlocksSpells = false

; Allows generated weapon hulls to collide with static/animstatic world geometry for native contact evidence.
bWeaponCollisionStaticWorldEnabled = true

; Re-queues the current equipped weapon's native visual attach task when FO4VR leaves the first-person weapon tree one mod transaction behind.
bWeaponCollisionNativeVisualRemapEnabled = true

; Generated weapon collision mode.
; 3 = OptimizedTriShape: one generated source per visible, extractable TriShape after point dedupe and support fitting.
iWeaponCollisionGroupingMode = 3

; Convex hull skin radius and duplicate-point merge grid, in Havok meters.
; Increase only if hull generation is too thin or noisy.
fWeaponCollisionConvexRadius = 0.01
fWeaponCollisionPointDedupGrid = 0.002

; OptimizedTriShape support fitting keeps real mesh vertices that preserve the convex envelope.
iWeaponCollisionSupportFitTargetPoints = 96
fWeaponCollisionSupportFitMaxErrorGameUnits = 0.5

; Maximum speed allowed when ROCK keyframes generated weapon hulls.
fWeaponCollisionMaxLinearVelocity = 50.0
fWeaponCollisionMaxAngularVelocity = 100.0

; Radius around the left hand used to search the equipped weapon for support/reload contact.
fWeaponInteractionProbeRadius = 12.0

; For pistols and other sidearms, the left support hand follows visually but does not steer the weapon.
bVisualOnlySidearmSupportGripEnabled = true

; Enables ROCK's See-Through-Scopes compatibility only when a loaded plugin filename starts with "3dscopes".
bSeeThroughScopesCompatibilityEnabled = true

; Moves weapon ReticleNode while the VR eye is looking through the scope.
bSeeThroughScopesReticleAlignmentEnabled = true

; Reticle alignment tuning, in game units. X moves left/right; Z moves up/down.
bSeeThroughScopesRightEyeDominant = true
fSeeThroughScopesEyeOffsetGameUnits = 2.3
fSeeThroughScopesReticleOffsetXGameUnits = 0.372727
fSeeThroughScopesReticleOffsetZGameUnits = -0.149692
fSeeThroughScopesLookDotThreshold = 0.98
fSeeThroughScopesDistanceThresholdGameUnits = 20.0

; ============================================================================
; 5. Soft Hand, Weapon, Body, And Static World Contact
; ============================================================================

; Projects the visible hand pose away from native contact evidence and fallback proxy/query surfaces.
; This is visual authority like the two-handed weapon grab; generated hknp bodies provide evidence.
bSoftContactEnabled = true
bSoftContactHandHandEnabled = true
bSoftContactWeaponHandEnabled = true
bSoftContactBodyEnabled = true
bSoftContactWorldEnabled = true

; Extra contact skin used by the visual solver, in game units.
fSoftContactRadiusPaddingGameUnits = 0.75

; Maximum per-hand visual offset applied by soft contact, in game units.
fSoftContactMaxCorrectionGameUnits = 7.0

; Weapon-hand contact is more compliant than walls/body contact. Shallow overlap applies only part of
; the correction, then ramps to a hard stop when penetration reaches the configured depth.
fSoftContactWeaponHandRadiusPaddingGameUnits = 0.25
fSoftContactWeaponHandMaxCorrectionGameUnits = 3.0
fSoftContactWeaponHandCorrectionScale = 0.35
fSoftContactWeaponHandHardStopPenetrationGameUnits = 4.0

; FRIK visual authority priority. Two-handed weapon grip uses a higher priority.
iSoftContactVisualPriority = 80

; Static-world visual hard stop. Fresh native hknp hand/world contact is preferred; shape queries are fallback.
; Query padding catches fast movement; contact padding defines the actual hard-stop shell.
fSoftContactWorldRadiusPaddingGameUnits = 1.5
fSoftContactWorldContactPaddingGameUnits = 0.35
fSoftContactWorldSkinGameUnits = 0.5
fSoftContactWorldPostReleaseReentryMinApproachDistanceGameUnits = 0.025
fSoftContactWorldCachedPlaneMaxTangentDriftGameUnits = 10.0
fSoftContactWorldMaxCorrectionGameUnits = 18.0

; Touch/impact haptics for world soft contact. Pulses fire on contact start only, never constantly while pressed.
bSoftContactWorldHapticsEnabled = true
fSoftContactWorldHapticDurationSeconds = 0.035
fSoftContactWorldHapticBaseIntensity = 0.18
fSoftContactWorldHapticMaxIntensity = 0.55
fSoftContactWorldHapticSpeedScale = 0.006
fSoftContactWorldHapticMinApproachSpeedGameUnits = 3.0
fSoftContactWorldHapticCooldownSeconds = 0.12

; ============================================================================
; 6. Native Melee Suppression
; ============================================================================

; Stops Fallout VR's animation-timed player melee hits so ROCK can own physical melee timing.
; NPC melee and non-player animation handlers still pass through.
bNativeMeleeSuppressionEnabled = true

; Stronger suppression for player melee hitframes and weapon-swing handling.
; Keep enabled to avoid stacking vanilla melee hits on top of ROCK physical contacts.
bNativeMeleeFullSuppression = true
bNativeMeleeSuppressWeaponSwing = true
bNativeMeleeSuppressHitFrame = true

; Extra log spam for native melee suppression decisions.
bNativeMeleeDebugLogging = false

; Filters only the native player character-controller bubble contacts.
; Keeps world/support blocker layers, but prevents the vanilla bubble from pushing clutter, guns, actors, ragdolls, and ROCK-generated bodies.
bNativeCharacterControllerObjectContactFilterEnabled = true

; ============================================================================
; 7. Selection Feedback
; ============================================================================

; Highlights the object ROCK thinks your hand can grab.
bHighlightEnabled = true

; ============================================================================
; 8. Debug Overlay: What To Draw
; ============================================================================

; Draws live ROCK Havok bodies from their real hknp shapes.
bDebugShowColliders = false

; Also draws the selected or held target body for hand-vs-object comparison.
bDebugShowTargetColliders = false

; Draws live transform axes. Red=X, green=Y, blue=Z.
bDebugShowHandAxes = false

; Draws grab constraint pivots and the error line between hand-side and object-side pivots.
bDebugShowGrabPivots = false

; Draws the five mesh probes used to compute custom finger curl at grab time.
bDebugShowGrabFingerProbes = false

; Draws the resolved mesh surface frame after a dynamic grab.
bDebugShowGrabPocketNormal = false

; Draws accepted contact-patch points used to fit the grab surface.
bDebugDrawGrabContactPatch = false

; Draws palm center, palm normal, and pointing ray.
bDebugShowPalmVectors = false

; More specific overlay filters and draw limits.
bDebugDrawHandColliders = false
bDebugDrawHandBoneColliders = false
bDebugDrawHandBoneContacts = false
bDebugDrawSoftContacts = false
; Draws only the hidden no-contact grab authority proxy body/axes used by custom dynamic grab.
bDebugDrawGrabAuthorityProxy = false
iDebugMaxHandBoneBodiesDrawn = 48
iDebugMaxBodyBoneBodiesDrawn = 32
bDebugDrawWeaponColliders = false
iDebugMaxWeaponBodiesDrawn = 100
iDebugMaxShapeGenerationsPerFrame = 100
iDebugMaxConvexSupportVertices = 6
bDebugUseBoundsForHeavyConvex = true

; Logs what ROCK can identify from hand/world contact body IDs.
; Keep enabled while mapping walls, tables, ladders, and other climb candidates.
bDebugContactTargetIdentityLogging = false
iDebugContactTargetIdentitySampleMilliseconds = 500

; ============================================================================
; 9. Debug Logs, Telemetry, And Notifications
; ============================================================================

; Very noisy per-frame diagnostic logging. Use only while investigating a specific issue.
bDebugVerboseLogging = false

; Focused logs for grab frame capture and held-object transform comparisons.
bDebugGrabFrameLogging = false

; Timestamp-matched grab telemetry for comparing video, overlay text, and ROCK.log rows.
bDebugGrabTransformTelemetry = false
bDebugGrabTransformTelemetryText = false
bDebugGrabTransformTelemetryAxes = false
iDebugGrabTransformTelemetryLogIntervalFrames = 1

; 0 = duplicate telemetry text into both VR eye halves.
; 1 = draw one text panel across the submitted texture.
iDebugGrabTransformTelemetryTextMode = 0

; Phase 0 diagnostic for future custom dynamic grab authority.
; Disabled by default. When enabled, creates hidden no-contact probe bodies and logs physics-step setter behavior.
bDebugGrabAuthorityPhase0ProbeEnabled = false
bDebugGrabAuthorityPhase0SolverProbeEnabled = true
; 0 = native noncollidable layer + bit 14, 1 = ROCK body layer + bit 14, 2 = ROCK hand layer + bit 14.
iDebugGrabAuthorityPhase0ProxyFilterPolicy = 0
iDebugGrabAuthorityPhase0LogIntervalFrames = 30
fDebugGrabAuthorityPhase0MotionAmplitudeGameUnits = 8.0

; In-game popup diagnostics for grab decisions.
bDebugShowGrabNotifications = false

; In-game popup diagnostics for weapon contact and support grip decisions.
bDebugShowWeaponNotifications = false

; Compares ROCK's direct first-person skeleton hand transforms against the FRIK API path.
; Diagnostic only. It does not choose the active hand frame.
bDebugHandTransformParity = false

; Logs and draws alternate world-origin candidates for selected or held objects.
; Diagnostic only. It does not change object motion.
bDebugWorldObjectOriginDiagnostics = false
iDebugWorldObjectOriginLogIntervalFrames = 120
fDebugWorldObjectOriginMismatchWarnGameUnits = 5.0

; ============================================================================
; 10. Skeleton Debug
; ============================================================================

; Draws markers and axes for live first-person skeleton bones.
bDebugShowRootFlattenedFingerSkeletonMarkers = false
bDebugShowSkeletonBoneVisualizer = false

; 0 = minimal/core bones, 1 = core body and fingers, higher modes may draw more if supported.
iDebugSkeletonBoneMode = 1

; Selects the skeleton source used by the debug visualizer.
iDebugSkeletonBoneSource = 1

; Draw limits and filters for skeleton debug drawing.
iDebugMaxSkeletonBonesDrawn = 256
bDebugDrawSkeletonBoneAxes = false
iDebugMaxSkeletonBoneAxesDrawn = 80
sDebugSkeletonAxisBoneFilter =

; Logs bone names and truncation information to ROCK.log.
bDebugLogSkeletonBones = false
bDebugLogSkeletonBoneTruncation = false
iDebugSkeletonBoneLogIntervalFrames = 120
sDebugSkeletonBoneLogFilter = RArm_Hand,LArm_Hand,RArm_Finger23,LArm_Finger23,Chest,Pelvis

; Marker and axis sizes for skeleton debug visuals.
fDebugRootFlattenedFingerSkeletonMarkerSize = 1.4
fDebugSkeletonBonePointSize = 1.4
fDebugSkeletonBoneAxisLength = 4.0

; ============================================================================
; 11. Hand Collision From Skeleton Bones
; ============================================================================

; Hand collider mode. 0 disables ROCK hand colliders, 1 builds them from live hand/finger bones.
iHandColliderRuntimeMode = 1

; Creates generated keyframed colliders for the major torso, arm, leg, and foot bones.
bBodyBoneCollidersEnabled = true

; Allows generated body colliders on ROCK's extended body layer to collide with static/animstatic world geometry.
bBodyBoneCollisionStaticWorldEnabled = true

; Global generated body collider size scales. Power armor starts from a separate larger descriptor set, then applies these scales.
fBodyBoneColliderStandardRadiusScale = 1.0
fBodyBoneColliderStandardLengthScale = 1.0
fBodyBoneColliderStandardConvexRadiusScale = 1.0
fBodyBoneColliderPowerArmorRadiusScale = 1.0
fBodyBoneColliderPowerArmorLengthScale = 1.0
fBodyBoneColliderPowerArmorConvexRadiusScale = 1.0

; Role-specific scales applied after the standard/power-armor profile scale.
fBodyBoneColliderTorsoRadiusScale = 1.0
fBodyBoneColliderArmRadiusScale = 1.0
fBodyBoneColliderLegRadiusScale = 1.0
fBodyBoneColliderFootRadiusScale = 1.0
fBodyBoneColliderTorsoLengthScale = 1.0
fBodyBoneColliderArmLengthScale = 1.0
fBodyBoneColliderLegLengthScale = 1.0
fBodyBoneColliderFootLengthScale = 1.0

; Optional descriptor-specific size overrides for tuning stash/holster/backpack zones.
; Format: Zone=radius,length,convex;PowerArmor.Zone=radius,length,convex
; Zone names include Pelvis, Chest, LeftShoulder, RightShoulder, LeftHand, RightHand, LeftHip, RightHip, LeftFoot, RightFoot.
sBodyBoneColliderZoneScaleOverrides =

; Allows generated hand colliders to collide with static/animstatic world geometry for native contact evidence.
bHandCollisionStaticWorldEnabled = true

; Requires the palm anchor before creating hand bone colliders.
bHandBoneCollidersRequirePalmAnchor = true

; Requires every expected finger bone before creating hand bone colliders.
; False allows partial hands if some finger bones are missing.
bHandBoneCollidersRequireAllFingerBones = true

; Speed clamps for bone-driven hand colliders.
fHandBoneColliderMaxLinearVelocity = 200.0
fHandBoneColliderMaxAngularVelocity = 500.0

; ============================================================================
; 12. Object Selection, Pulling, And Push Assist
; ============================================================================

; Nearby object search distances, in game units.
fNearDetectionRange = 25.0
fFarDetectionRange = 350.0

; Swept-sphere selection cast sizes, in game units.
fNearCastRadiusGameUnits = 6.0
fNearCastDistanceGameUnits = 25.0
fFarCastRadiusGameUnits = 21.0

; Far selection still follows the hand ray, but the hit must also be inside the HMD view cone.
bFarSelectionHmdConeEnabled = true
fFarSelectionHmdConeHalfAngleDegrees = 50.0

fCloseSelectionBehindPalmToleranceGameUnits = 2.0

; Collision filters for selection casts and far-ray clipping. Do not change unless auditing layers.
sSelectionShapeCastFilterInfo = 000B002D
sFarClipRayFilterInfo = 02420028

; Pull-to-hand tuning. Pull applies velocity to dynamic bodies; it does not teleport objects.
fPullApplyVelocityTime = 0.2
fPullOwnerGraceSeconds = 1.0
fPullTrackHandTime = 0.1
fPullDestinationZOffsetHavok = 0.01
fPullDurationA = 0.715619
fPullDurationB = -0.415619
fPullDurationC = 0.656256
fPullMaxVelocityHavok = 10.0
fPullAutoGrabDistanceGameUnits = 18.0
fPullCatchRetryMaxTimeSeconds = 0.65
bPullCatchWideReacquireEnabled = true
fPullCatchWideReacquireRadiusGameUnits = 32.0
fPullCatchWideReacquireMaxBodyDistanceGameUnits = 42.0
fPulledAngularDamping = 8.0
fPulledGrabHandAdjustDistanceGameUnits = 10.5

; Maximum scene-node depth used when scanning an object for physics bodies.
iObjectPhysicsTreeMaxDepth = 12

; Lets moving hands or weapon hulls nudge already-dynamic props.
; It never converts static or keyframed objects into dynamic objects.
bDynamicPushAssistEnabled = true
fDynamicPushMinSpeed = 0.35
fDynamicPushMaxImpulse = 2.0
fDynamicPushCooldownSeconds = 0.08

; ============================================================================
; 13. Grab Drive Feel
; ============================================================================

; Shared constraint drive used when both hands hold the same loose object.
; Ordinary one-hand dynamic grabs use the native mouse-spring drive below instead.

; Linear shared-constraint motor response. Lower tau is stiffer and faster. Higher damping calms oscillation.
fGrabLinearTau = 0.03
fGrabLinearDamping = 0.8
fGrabLinearProportionalRecovery = 2.0
fGrabLinearConstantRecovery = 1.0

; Angular shared-constraint motor response. Same idea as linear motor, but for rotation.
fGrabAngularTau = 0.03
fGrabAngularDamping = 0.8
fGrabAngularProportionalRecovery = 2.0
fGrabAngularConstantRecovery = 1.0

; Maximum force the grab constraint can apply.
fGrabConstraintMaxForce = 2000.0

; Angular force is max linear force divided by this number.
fGrabAngularToLinearForceRatio = 12.5

; Caps force by object mass so light objects do not explode out of the hand.
fGrabMaxForceToMassRatio = 500.0

; Extra soft angular startup. Higher values reduce rotational snap at pickup.
fGrabFadeInStartAngularRatio = 100.0

; Time for grab force to ramp in after pickup.
fGrabForceFadeInTime = 0.1

; Native mouse-spring response used by ordinary single-hand dynamic grabs.
; Linear above 1.0 catches up faster; angular below 1.0 slows rotation snap.
fGrabNativeMouseSpringLinearResponseScale = 1.35
fGrabNativeMouseSpringAngularResponseScale = 0.75
fGrabNativeMouseSpringAngularClampScale = 0.85

; Custom dynamic-grab object rotation reference for proxy authority.
; 0 = legacy BODY angular target, 1 = converted BODY capture, 2 = split visual/native-boundary angular target,
; 3 = palm/proxy translation with raw hand/controller rotation.
iGrabObjectRotationReferenceMode = 3

; Telemetry-first multipliers for non-equipped weapon refs grabbed as loose dynamic objects.
; Defaults are neutral and do not affect equipped weapon support.
; Native multipliers affect ordinary one-hand loose weapon grabs.
fGrabLooseWeaponNativeLinearResponseMultiplier = 1.0
fGrabLooseWeaponNativeAngularResponseMultiplier = 1.0
fGrabLooseWeaponNativeAngularClampMultiplier = 1.0
fGrabLooseWeaponAdaptiveLeadMultiplier = 1.0

; Shared-constraint multipliers affect loose weapon refs after peer-hand join.
fGrabLooseWeaponSharedConstraintLinearTauMultiplier = 1.0
fGrabLooseWeaponSharedConstraintAngularTauMultiplier = 1.0
fGrabLooseWeaponSharedConstraintCollisionTauMultiplier = 1.0
fGrabLooseWeaponSharedConstraintLinearDampingMultiplier = 1.0
fGrabLooseWeaponSharedConstraintAngularDampingMultiplier = 1.0
fGrabLooseWeaponSharedConstraintMaxForceMultiplier = 1.0
fGrabLooseWeaponSharedConstraintAngularForceMultiplier = 1.0
fGrabLooseWeaponSharedConstraintLinearRecoveryMultiplier = 1.0
fGrabLooseWeaponSharedConstraintAngularRecoveryMultiplier = 1.0

; Bounded target lead around the native mouse spring, driven by hand/object lag.
bGrabAdaptiveHeldResponseEnabled = true
fGrabAdaptiveHeldLeadTimeMax = 0.035
fGrabAdaptiveHeldMaxLeadDistanceGameUnits = 8.0
fGrabAdaptiveHeldMaxAngularLeadDegrees = 18.0
fGrabAdaptiveHeldFullErrorGameUnits = 20.0
fGrabAdaptiveHeldCollisionLeadScale = 0.25

; Adaptive tau range used when contact or lag requires a stronger correction.
fGrabTauMin = 0.01
fGrabTauMax = 0.8
fGrabTauLerpSpeed = 0.5

; Raises tau when the held body falls behind. Max force stays finite by default to preserve HIGGS-style mass feel.
bGrabAdaptiveMotorEnabled = true
fGrabAdaptivePositionFullError = 20.0
fGrabAdaptiveRotationFullError = 60.0
fGrabAdaptiveMaxForceMultiplier = 1.0

; Clamps extreme inertia tensors on grabbed rigid bodies to keep the solver stable.
fGrabMaxInertiaRatio = 10.0

; ============================================================================
; 14. Grab Safety, Release, And Player Movement
; ============================================================================

; Force-releases if the held object stays too far from the palm for too long.
fGrabMaxDeviation = 50.0
fGrabMaxDeviationTime = 2.0

; VR button used for grab. 2 is the standard grip button.
iGrabButtonID = 2

; Multiplies held-object velocity when you release to throw.
fThrowVelocityMultiplier = 1.5

; Uses tracked hand velocity, COM-relative angular swing, and a small object-velocity blend for throws.
bGrabControllerDerivedThrowVelocityEnabled = true
fGrabThrowObjectVelocityBlend = 0.35
fGrabThrowTangentialVelocityScale = 1.0
fGrabThrowMaxVelocityHavok = 12.0
fGrabThrowAngularVelocityScale = 1.0
fGrabThrowMaxAngularVelocityRadiansPerSecond = 18.0

; Keeps hand collision suppressed briefly after release so the object is not launched instantly.
fGrabReleaseHandCollisionDelaySeconds = 0.10

; Shoulder stash transfers a held loose item to inventory when grip is released inside the HMD-relative back volume.
; Generated FRIK body-zone colliders are backup evidence for tracking loss and remain the preferred path for holsters.
bShoulderStashEnabled = true
bShoulderStashUseBodyZoneColliders = true
bShoulderStashUseHmdBackVolume = true
fShoulderStashEnterPaddingGameUnits = 5.0
fShoulderStashExitPaddingGameUnits = 8.0
fShoulderStashMinDwellSeconds = 0.08
fShoulderStashMaxSpeedGameUnitsPerSecond = 140.0
iShoulderStashRecentContactFrames = 4
iShoulderStashSustainedContactMissFrames = 18
fShoulderStashHmdBackRightOffsetXGameUnits = 17.5
fShoulderStashHmdBackRightOffsetYGameUnits = -5.0
fShoulderStashHmdBackRightOffsetZGameUnits = -6.85
fShoulderStashHmdBackLeftOffsetXGameUnits = -17.5
fShoulderStashHmdBackLeftOffsetYGameUnits = -5.0
fShoulderStashHmdBackLeftOffsetZGameUnits = -6.85
fShoulderStashHmdBackRadiusGameUnits = 11.0
bShoulderStashSkipActivateBooks = true
bShoulderStashSkipActivateNotes = true
bShoulderStashShowCollectedNotifications = true

; Removes leftover object velocity while held. 0=no damping, 1=stop instantly.
fGrabVelocityDamping = 0.25

; Preserves player locomotion separately from held-object residual velocity.
bGrabPlayerSpaceCompensation = true
fGrabPlayerSpaceWarpDistance = 35.0
fGrabPlayerSpaceWarpMinRotationDegrees = 0.6
bGrabPlayerSpaceTransformWarpEnabled = true
bGrabResidualVelocityDamping = true

; Temporarily calms nearby dynamic clutter when a grab starts.
; Uses verified FO4VR hknp motion-property damping leases with safe restore.
; Damping values are hknp per-second coefficients, not normalized percentages.
bGrabNearbyDampingEnabled = true
fGrabNearbyDampingRadius = 90.0
fGrabNearbyDampingSeconds = 0.35
fGrabNearbyLinearDamping = 3.0
fGrabNearbyAngularDamping = 5.5

; ============================================================================
; 15. Hand-Pocket Grab Acquisition
; ============================================================================

; Distance from the hand pocket where an object is considered already touching.
fGrabTouchAcquireDistanceGameUnits = 4.0

; Distance where the object should converge into the palm pocket instead of finalizing immediately.
fGrabNearConvergeDistanceGameUnits = 28.0

; Hand-pocket offset and radius, in game units, from the root-flattened palm frame.
fGrabPocketDepthGameUnits = 7.0
fGrabPocketRadiusGameUnits = 9.0

; Moves the captured grip point slightly inside the object from the raw hit/mesh seed.
fGrabGripInsetGameUnits = 2.0
fGrabGripMaxInsetGameUnits = 6.0

; Optional near-converge diagnostic timeout. A value of 0 disables timeout promotion.
fGrabConvergeMaxTimeSeconds = 0.35
iGrabConvergeStableFrames = 3
fGrabConvergeMaxSeparatingSpeedGameUnitsPerSecond = 40.0
fGrabAcquisitionVisualStartDistanceGameUnits = 28.0

; ============================================================================
; 16. Grab Contact Evidence
; ============================================================================

; Requires grouped finger contact evidence before trusting a mesh grab.
bGrabMultiFingerContactValidationEnabled = true

; 0 = permissive, 1 = hybrid patch and finger evidence, 2 = strict grouped-finger debug.
iGrabContactQualityMode = 1
iGrabMinFingerContactGroups = 3
fGrabMinFingerContactSpreadGameUnits = 1.0
fGrabFingerContactMeshSnapMaxDistanceGameUnits = 10.0
fGrabSurfaceBehindPalmToleranceGameUnits = 1.5

; Maximum age for semantic contacts used as touch evidence.
iGrabOppositionContactMaxAgeFrames = 5

; Moves the rendered hand toward the mesh-matched held pose during grab startup.
bGrabHandLerpEnabled = true
fGrabHandLerpTimeMin = 0.10
fGrabHandLerpTimeMax = 0.20
fGrabHandLerpMinDistance = 7.0
fGrabHandLerpMaxDistance = 14.0

; ============================================================================
; 17. Finger Pose
; ============================================================================

; Computes custom finger curl from the held object's visible mesh.
bGrabMeshFingerPoseEnabled = true

; Sends per-joint finger values to FRIK when available instead of one curl per finger.
bGrabMeshJointPoseEnabled = true

; Frames between finger pose refreshes.
iGrabFingerPoseUpdateInterval = 3

; Lowest allowed finger value. 0=fully closed, 1=fully straight.
fGrabFingerMinValue = 0.2

; Maximum per-second finger pose movement.
fGrabFingerPoseSmoothingSpeed = 14.0

; Uses FRIK's authored finger joint transforms plus bounded mesh-contact aim correction.
bGrabMeshLocalTransformPoseEnabled = true
fGrabFingerLocalTransformSmoothingSpeed = 14.0
fGrabFingerLocalTransformMaxCorrectionDegrees = 35.0
fGrabFingerSurfaceAimStrength = 0.75
bGrabFingerRejectBacksideHits = true
fGrabFingerSurfacePlaneToleranceGameUnits = 1.5
fGrabThumbOppositionStrength = 1.0
fGrabThumbAlternateCurveStrength = 0.65
bGrabThumbSurfaceSafetyEnabled = true
fGrabThumbSurfaceSafetyMarginGameUnits = 1.0

; ============================================================================
; 18. Mesh Contact And Grab Evidence
; ============================================================================

; Weighting used when choosing the best mesh triangle for grab contact.
fGrabLateralWeight = 0.6
fGrabDirectionalWeight = 0.4
fGrabMaxTriangleDistance = 100.0

; Uses visual mesh as the contact source. Collision still identifies the object body.
bGrabMeshContactOnly = true

; Fails generic close grab when no mesh contact is found. Authored ROCK grab nodes still work.
bGrabRequireMeshContact = true

; Palm-plane probe patch used to capture the touched object-local point.
bGrabContactPatchEnabled = true
iGrabContactPatchProbeCount = 5
fGrabContactPatchProbeSpacingGameUnits = 3.0
fGrabContactPatchProbeRadiusGameUnits = 2.0
fGrabContactPatchMeshSnapMaxDistanceGameUnits = 6.0
fGrabContactPatchMaxNormalAngleDegrees = 35.0

; Mesh-snap gate used by contact-patch evidence.
fGrabAlignmentMaxSelectionToMeshDistance = 8.0

; ============================================================================
; 19. Authored Grab Nodes And Close-Hand Curl
; ============================================================================

; Prefer authored NIF markers named below before falling back to mesh contact.
bGrabNodeAnchorsEnabled = true
bGrabNodeRejectOppositeHandAnchor = true

; Logs NifSkope-ready ROCK:GrabR/L transforms after a successful grab.
bPrintGrabNodeInfo = false

; Authored NIF marker names for right and left hand grab anchors.
sGrabNodeNameRight = ROCK:GrabR
sGrabNodeNameLeft = ROCK:GrabL

; Marker/helper node names excluded from fallback mesh-surface solving.
sGrabNodeNameBlacklist = ROCK:GrabR,ROCK:GrabL

; Pre-curls the hand when close selection is active.
bSelectedCloseFingerCurlEnabled = true
fSelectedCloseFingerAnimMaxHandSpeed = 0.9
fSelectedCloseFingerAnimValue = 0.9

; Hand-side grab pivot in ROCK hand space. This is the actual constraint pivot A.
fRightGrabPivotAHandspaceX = 6.0
fRightGrabPivotAHandspaceY = 0.2
fRightGrabPivotAHandspaceZ = -2.0
fLeftGrabPivotAHandspaceX = 6.0
fLeftGrabPivotAHandspaceY = -0.2
fLeftGrabPivotAHandspaceZ = -2.0

; ============================================================================
; 20. Grab Startup Lerp
; ============================================================================

; Moves a newly grabbed object toward the palm during pickup.
; Speed controls how quickly it moves/rotates, MaxTime caps the startup phase.
fGrabLerpSpeed = 300.0
fGrabLerpAngularSpeed = 360.0
fGrabLerpMaxTime = 0.5

; ============================================================================
; 21. Grab And Held-Object Haptics
; ============================================================================

; ROCK haptic pulses for grab commit, pull start/catch, and held-object impacts.
bGrabHapticsEnabled = true
fGrabHapticDurationSeconds = 0.055
fGrabHapticBaseIntensity = 0.12
fGrabHapticMaxIntensity = 0.80
fGrabHapticMassScale = 0.06
fGrabHapticMassExponent = 0.60
fPullStartHapticIntensity = 0.18
fPullCatchHapticIntensity = 0.22
fSelectionLockHapticIntensity = 0.15
fSelectionLockReleaseHapticIntensity = 0.10
fSelectionLockReleaseHapticDurationSeconds = 0.02
bHeldImpactHapticsEnabled = true
fHeldImpactHapticDurationSeconds = 0.035
fHeldImpactHapticBaseIntensity = 0.12
fHeldImpactHapticMaxIntensity = 0.85
fHeldImpactHapticSpeedScale = 0.006
fHeldImpactHapticMassScale = 0.035
fHeldImpactHapticMassExponent = 0.55
fHeldImpactHapticMinSpeedGameUnits = 8.0
fHeldImpactHapticCooldownSeconds = 0.12
fHeldImpactHapticDampedMultiplier = 0.55

; Shoulder stash haptics pulse steadily while an item is inside the HMD back zone, then fire a stronger confirmation on transfer.
bShoulderStashHapticsEnabled = true
fShoulderStashCandidateHapticDurationSeconds = 0.075
fShoulderStashCandidateHapticBaseIntensity = 0.20
fShoulderStashCandidateHapticIntensity = 0.42
fShoulderStashCandidateHapticIntervalSeconds = 0.075
fShoulderStashCommitHapticDurationSeconds = 0.12
fShoulderStashCommitHapticIntensity = 0.85
