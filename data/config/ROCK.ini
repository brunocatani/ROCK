; ROCK.ini - ROCK Physics Interaction Configuration
; Realistic Overengineered Character Kinetics (ROCK) for Fallout 4 VR
;
; INI section: [PhysicsInteraction]
; Key names match FRIK's existing INI section so values can be migrated by copy-paste.
; All float values use Havok units (meters) unless noted as "game units" (1 HU = 70 game units).
; Missing keys silently fall back to the compiled-in defaults shown here.

[Debug]

; Shared FRIK/ROCK log levels: 0=trace, 1=debug, 2=info, 3=warn, 4=error, 5=critical, 6=off.
; Keep production at info. Use debug/trace only while investigating a specific issue because mesh and frame logs are high volume.
iLogLevel = 2

; Timestamp and line format for ROCK.log. Add "%s:%#" when source file and line are needed.
sLogPattern = %Y-%m-%d %H:%M:%S.%e [%l] %v

; Minimum interval for repeated sampled diagnostics.
iLogSampleMilliseconds = 2000

[PhysicsInteraction]
; --- Master Toggle ---
; Disabling this skips all ROCK physics work each frame (hand collision, grab, constraint updates).
bEnabled = true

; --- Hand Collision Body ---
; Active FO4/FRIK hand-space box half-extents (Havok units / meters).
; Shape is a flat palm slab: long along fingers (X), wide across the palm (Y), thin through the palm (Z).
; Full dimensions = 2x these values. Defaults matched to HIGGS proportions.
; X = fingertip direction half-length
; Y = cross-palm/lateral half-width
; Z = palm-thickness half-depth
fHandCollisionHalfExtentX = 0.09
fHandCollisionHalfExtentY = 0.05
fHandCollisionHalfExtentZ = 0.02

; Active FO4/FRIK hand-space collision offset seed (Havok units).
; +X = fingertips. Mode 1 does not mirror X; FRIK's left/right hand transforms already carry handedness.
fHandCollisionOffsetHandspaceX = 0.086
fHandCollisionOffsetHandspaceY = -0.005
fHandCollisionOffsetHandspaceZ = 0.0

; Convex radius for rounded box edges (Havok units). 0 = sharp box, matching HIGGS default.
fHandCollisionBoxRadius = 0.0

; Active hand-space palm vectors (game units for position, unit vectors for directions).
; Mode 1 maps these onto the FO4/FRIK raw hand node as X=fingers, Y=cross-palm, Z=palm thickness.
fPalmPositionHandspaceX = 0.0
fPalmPositionHandspaceY = -2.4
fPalmPositionHandspaceZ = 6.0
; Close selection/yellow line normal. Authored Z is the collider palm-face axis; do not use Y for palm-face detection.
fPalmNormalHandspaceX = 0.0
fPalmNormalHandspaceY = 0.0
fPalmNormalHandspaceZ = 1.0
; Far selection/blue line direction. This path is not affected by the close-normal Y mirror.
fPointingVectorHandspaceX = 0.0
fPointingVectorHandspaceY = 0.0
fPointingVectorHandspaceZ = 1.0

; Flip the palm normal after handspace conversion. Useful when detection exits the back of the hand.
bReversePalmNormal = true

; Flip the far selection direction after handspace conversion. This controls the blue debug line.
bReverseFarGrabNormal = true

; Maps authored handspace into the raw FO4/FRIK hand-node basis.
; 0 = direct HIGGS XYZ with left X mirror.
; 1 = active FO4/FRIK X/-Z/Y with no manual hand mirror.
; 2 = legacy ROCK Y/Z/X with left Z mirror.
iHandspaceBasisMode = 1

; --- Feature Toggles ---
; Enable weapon collision body on layer 44 (disabled until grab debugging is complete).
bWeaponCollisionEnabled = true

; Controls whether generated ROCK weapon collision blocks FO4 projectile layers.
; Default false prevents Weapons of Fate shots from colliding with the weapon's own hulls while aiming down sights.
bWeaponCollisionBlocksProjectiles = false
bWeaponCollisionBlocksSpells = false

; Weapon collision is generated from visible weapon mesh only.
; The old native-body mirror fallback is intentionally removed.

; Convex radius and point dedup grid for generated visible-mesh weapon hulls (Havok units / meters).
fWeaponCollisionConvexRadius = 0.01
fWeaponCollisionPointDedupGrid = 0.002

; Velocity clamps for keyframed weapon collision bodies. Defaults preserve the old hardcoded behavior.
fWeaponCollisionMaxLinearVelocity = 50.0
fWeaponCollisionMaxAngularVelocity = 100.0

; Active left-hand probe for equipped-weapon support/reload interaction bodies.
; This mirrors HIGGS' near-hand weapon search and does not depend on keyframed-body contact events.
fWeaponInteractionProbeRadius = 12.0

; Experimental: let ROCK drive normal one-handed weapon orientation from mesh primary-grip geometry.
; Leave disabled for production. FRIK owns normal equipped weapon orientation; ROCK only takes visual
; weapon authority during active two-handed support grip.
bOneHandedMeshPrimaryGripAuthorityEnabled = false

; Optional local rotation applied once to the generated weapon-root collision package.
; Degrees are applied in local X, then Y, then Z order before the source weapon basis.
bWeaponCollisionRotationCorrectionEnabled = false
fWeaponCollisionRotationX = 0.0
fWeaponCollisionRotationY = 0.0
fWeaponCollisionRotationZ = 0.0

; --- Reload Integration ---
; Observe FO4VR's vanilla reload/ammo events and map them into ROCK's physical reload coordinator.
; This keeps modded weapon compatibility: vanilla reload remains the stage source, while ROCK physical
; magazine/ammo/socket handling is layered on top as verified native pieces are added.
bReloadUseVanillaStageObserver = true

; Keep a separate physical-completion gate in the coordinator. The coordinator keeps reload routing active
; when vanilla reports completion early; native ammo blocking and node clone/hide still require verified wrappers.
bReloadRequirePhysicalCompletion = true

; Permit later verified fallback sources when event data is insufficient. No unverified fallback is active.
bReloadAllowStageFallbacks = true

; If FO4VR emits reload-start without a later ammo/complete event, clear ROCK's unsupported physical reload gate after this many frames.
iReloadObserverStaleFrameTimeout = 180

; Log every reload/ammo event and observer transition.
bReloadDebugStageLogging = false

; --- Native Melee Suppression ---
; Suppress FO4VR's player animation-driven melee timing at the verified animation handlers.
; ROCK will later use its physical swing/contact path to invoke native hit/damage side effects.
; NPC melee and non-player animation handlers are always passed through.
bNativeMeleeSuppressionEnabled = true
bNativeMeleeSuppressWeaponSwing = true
bNativeMeleeSuppressHitFrame = true
bNativeMeleeDebugLogging = false

; --- Selection Highlight ---
; Enable visual highlight on objects when your hand is near them (selection feedback).
bHighlightEnabled = true

; FormID of the TESEffectShader to use (hex, no 0x prefix). HOT-RELOADED ? save file to apply.
; Change this value, save, and the new shader takes effect on the next object you look at.
; Set to 00000000 to disable highlight entirely.
;
; Available shaders from Fallout4.esm (try each to see which looks best in VR):
;   00249733 = VansActivateFXS           ? VANS perk activation highlight (default)
;   00247A3F = DetectLifePATargetFXS     ? PA targeting scan-line effect
;   0022517C = DetectLifeFXS             ? Detect Life blue glow with particles
;   001E077C = PowerArmorTargetingHUDFXS ? PA targeting HUD highlight
sHighlightShaderFormID = 001E077C

; --- Debug ---
; Draw ROCK-created live Havok bodies from their actual hknpShape data.
; Includes hand bodies on layer 43 and weapon bodies on layer 44.
bDebugShowColliders = true

; Also draw the currently selected or held target body for hand-vs-object comparison.
bDebugShowTargetColliders = false

; Draw diagnostic transform axes through the live debug overlay.
; X = red, Y = green, Z = blue. Yellow lines show raw hand origin -> collider/body center.
; Raw hand axes are shortest, computed collider axes are medium length, live Havok body axes are longest.
bDebugShowHandAxes = true

; Draw actual grab constraint pivots:
; - hand-side pivot A
; - object-side pivot B
; - red error line between them
bDebugShowGrabPivots = true

; Draw the five mesh finger probes created at grab time.
; The probes show what geometry was used to compute the custom finger curl pose.
bDebugShowGrabFingerProbes = true

; Draw palm center, palm normal ray, and pointing ray through the live overlay.
bDebugShowPalmVectors = true

; Visualize raw hand origin plus local palm basis markers.(OLD PIECE OF SHIT MARKERS)
bDebugShowPalmBasis = false

; Fine-grained collider overlay throttles. These only affect the live debug visualizer, not collision behavior.
bDebugDrawHandColliders = true
bDebugDrawWeaponColliders = true
iDebugMaxWeaponBodiesDrawn = 100
iDebugMaxShapeGenerationsPerFrame = 100
iDebugMaxConvexSupportVertices = 6
bDebugUseBoundsForHeavyConvex = true

; Per-frame diagnostic logging: wand axes, AABB hits, grip positions, constraint state.
; Disable in production ? generates significant log volume.
bDebugVerboseLogging = false

; Focused held-object frame diagnostics for raw-vs-authored hand-space investigation.
; Logs grab snapshot plus throttled held-update comparisons without the full verbose stream.
bDebugGrabFrameLogging = false

; Show in-game ROCK grab diagnostics. Leave disabled for production; logs remain available through the log level settings above.
bDebugShowGrabNotifications = false

; Show compact in-game weapon contact/support-grip diagnostics. Leave disabled for production.
bDebugShowWeaponNotifications = false

; Compare ROCK's local cached hand transforms against the FRIK API transform path.
bDebugHandTransformParity = false

; Hand frame used by collision, palm selection, grab math, and debug axes.
; 0 = fist helper under native wand, falling back to wand node
; 1 = native wand node only
; 2 = first-person RArm_Hand/LArm_Hand bone
; 3 = FRIK API hand transform (default)
iHandFrameSource = 3

; Swap primary/secondary wand slots for hand-frame debugging or left-handed setups.
bHandFrameSwapWands = false

; --- Object Detection ---
; Radii for the two-stage nearby-object scan (game units).
; Near range is used for the primary grab trigger; far range for look-ahead highlighting.
fNearDetectionRange = 25.0
fFarDetectionRange = 350.0

; Swept-sphere selection cast dimensions (game units). Near cast distance defaults to fNearDetectionRange.
fNearCastRadiusGameUnits = 6.0
fNearCastDistanceGameUnits = 25.0
fFarCastRadiusGameUnits = 21.0
; Collision filter info for swept-sphere selection and far ray clipping. Hex, no 0x prefix.
sSelectionShapeCastFilterInfo = 000B002D
sFarClipRayFilterInfo = 02420028

; Dynamic-only pull-to-hand tuning. Pull applies velocity to promoted dynamic object bodies;
; it does not keyframe or teleport the object.
fPullApplyVelocityTime = 0.2
fPullTrackHandTime = 0.1
fPullDestinationZOffsetHavok = 0.01
fPullDurationA = 0.715619
fPullDurationB = -0.415619
fPullDurationC = 0.656256
fPullMaxVelocityHavok = 10.0
fPullAutoGrabDistanceGameUnits = 18.0

; Maximum NiAVObject child depth used when scanning an object tree for collision bodies.
iObjectPhysicsTreeMaxDepth = 12

; Passive hand/weapon bump assist for already-dynamic props. This never converts static/keyframed world objects.
bDynamicPushAssistEnabled = true
fDynamicPushMinSpeed = 0.35
fDynamicPushMaxImpulse = 2.0
fDynamicPushCooldownSeconds = 0.08

; --- Constraint Motors: Linear ---
; Tau controls how aggressively the linear motor drives toward the target each step.
; Lower tau = stiffer, faster response. Matches HIGGS default of 0.03.
fGrabLinearTau = 0.03
fGrabLinearDamping = 0.8
fGrabLinearProportionalRecovery = 2.0
fGrabLinearConstantRecovery = 1.0

; --- Constraint Motors: Angular ---
; Same semantics as the linear motor block, applied to rotational correction.
fGrabAngularTau = 0.03
fGrabAngularDamping = 0.8
fGrabAngularProportionalRecovery = 2.0
fGrabAngularConstantRecovery = 1.0

; --- Constraint Force Limits ---
; Maximum linear motor force (Havok internal units). HIGGS uses 2300; tuned down to 2000
; for FO4VR's slightly different solver to avoid micro-jitter on lightweight objects.
fGrabConstraintMaxForce = 2000.0

; Angular force = fGrabConstraintMaxForce / this ratio. HIGGS: 17.
fGrabAngularToLinearForceRatio = 12.5

; Force cap per kg of grabbed object mass. Prevents light items from accelerating too fast.
; HIGGS: 600. Tuned to 500 for FO4VR.
fGrabMaxForceToMassRatio = 500.0

; Angular-to-linear force ratio at the moment of grab, before it fades to fGrabAngularToLinearForceRatio.
; High initial ratio reduces rotational snap on pickup. HIGGS: 200.
fGrabFadeInStartAngularRatio = 100.0

; --- Constraint Dynamics ---
; Time in seconds for the motor force to ramp from 0 to full on grab (prevents snapping).
fGrabForceFadeInTime = 0.1

; TauMin is used while the held body reports contact; free-hold returns to the linear/angular tau above.
; TauMax and distance thresholds are preserved for config compatibility and future distance shaping.
fGrabTauMin = 0.01
fGrabTauMax = 0.8
fGrabTauLerpSpeed = 0.5

; Distance thresholds (game units) that influence tau lerp direction.
; Below CloseThreshold: lerp toward TauMax. Above FarThreshold: lerp toward TauMin.
fGrabCloseThreshold = 2.0
fGrabFarThreshold = 15.0

; Raise force/tau only when the live held body falls behind the desired hand-relative body transform.
; This keeps normal holds calm while giving fast hand movement more authority.
bGrabAdaptiveMotorEnabled = true
fGrabAdaptivePositionFullError = 20.0
fGrabAdaptiveRotationFullError = 60.0
fGrabAdaptiveMaxForceMultiplier = 4.0

; --- Inertia Normalization ---
; Maximum allowed ratio between the highest and lowest inertia axis on a grabbed rigid body.
; Clamping prevents extreme inertia tensors from causing solver instability. HIGGS: 10.
fGrabMaxInertiaRatio = 10.0

; --- Grab Behavior ---
; If the grabbed object centre deviates more than this from the palm (game units) for
; longer than fGrabMaxDeviationTime seconds, the grab is force-released.
fGrabMaxDeviation = 50.0
fGrabMaxDeviationTime = 2.0

; VR button ID used to trigger grab. 2 = grip button (standard VR grip).
iGrabButtonID = 2

; Velocity multiplier applied to the held object's velocity at the moment of throw release.
fThrowVelocityMultiplier = 1.5

; Fraction of held-object velocity removed each frame while held (0=no damping, 1=stop instantly).
; Damping is applied to residual object motion after player-space movement is preserved.
fGrabVelocityDamping = 0.25

; Preserve player locomotion separately from residual object velocity, matching HIGGS' player-space body model.
bGrabPlayerSpaceCompensation = true
fGrabPlayerSpaceWarpDistance = 35.0
bGrabResidualVelocityDamping = true

; Move the rendered hand toward the mesh-matched held-object-relative pose during grab startup.
bGrabHandLerpEnabled = true
fGrabHandLerpTimeMin = 0.10
fGrabHandLerpTimeMax = 0.20
fGrabHandLerpMinDistance = 7.0
fGrabHandLerpMaxDistance = 14.0

; Use the held object's visible mesh to compute five custom FRIK finger curl values.
bGrabMeshFingerPoseEnabled = true

; Send mesh-derived per-joint values to FRIK v5 instead of one value per finger when available.
bGrabMeshJointPoseEnabled = true
iGrabFingerPoseUpdateInterval = 3

; Minimum curl value for mesh fingers. 0 = fully closed, 1 = fully straight.
fGrabFingerMinValue = 0.2

; Maximum per-second movement for mesh-derived finger joint values.
fGrabFingerPoseSmoothingSpeed = 14.0

; Additional handspace offset applied to the grab anchor/pivot A, in game units.
; Values are authored for the right hand; left hand auto-negates authored Y.
; This moves the visible pre-grab point, the selection ray origin, and the hand-side constraint pivot.
; It does not change the hand collision shape.
fGrabPivotAOffsetHandspaceX = 5.0
fGrabPivotAOffsetHandspaceY = 2.0
fGrabPivotAOffsetHandspaceZ = -8.0

; Flip the grab anchor/pivot A offset vector after reading the three values above.
bReverseGrabPivotAOffset = false

; --- Grab Lerp (initial snap-to-hand) ---
; On pickup the object lerps from its world position toward the palm.
; Speed values control how fast it moves and rotates each second during the lerp phase.
; MaxTime caps the lerp so it doesn't run indefinitely if the object can't reach the palm.
fGrabLerpSpeed = 300.0
fGrabLerpAngularSpeed = 360.0
fGrabLerpMaxTime = 0.5

; --- Velocity Clamp ---
; Hard caps on the velocity applied to the grabbed body each frame.
; Safety net against tracking glitches that would otherwise fling objects at extreme speeds.
; Normal VR hand linear velocity: ~5-20 m/s. Angular: ~1-50 rad/s, extreme up to ~125.
fMaxLinearVelocity = 200.0
fMaxAngularVelocity = 500.0

; --- Character Controller ---
; Scale applied to the player character controller bubble radius for hand collision clearance.
; 1.0 = default radius, 0.7 = 30% smaller (gives more room for hand collision near body).
fCharControllerRadiusScale = 0.7

; Allow hand collision shapes to interact with NPC character controllers (capsules).
; Disabled by default ? enabling can cause hands to push NPCs.
bCollideWithCharControllers = false


